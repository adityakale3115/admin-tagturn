<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#2563eb" />
    
    <meta name="description" content="TagTurn Station - Advanced Inventory and Vendor Management System" />
    <meta name="author" content="TagTurn Ecosystem" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>TagTurn | Admin Station</title>

    <style>
      /* Global Reset to prevent layout shifts */
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc; /* Matches your --bg-body variable */
        overflow-x: hidden;
      }

      /* Basic splash loader styling */
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Inter', sans-serif;
        color: #64748b;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top: 3px solid #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 1rem;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: sans-serif;">
        <h2>JavaScript Required</h2>
        <p>Identity verification cannot proceed without JavaScript enabled.</p>
      </div>
    </noscript>

    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div style="letter-spacing: 2px; font-size: 10px; font-weight: 700;">CONNECTING_TO_STATION...</div>
      </div>
    </div>
  </body>
</html>
